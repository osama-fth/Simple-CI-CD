name: SIMPLE-CI-CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-audit:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4

      - name: Install deps
        run: npm ci

      - name: Security audit (fail high/critical)
        run: |
          set -e
          npm audit --audit-level=high || (echo "Vulnerabilità >=high trovate" && exit 1)
      - name: Lint
        run: npm run lint

  build-and-scan-and-test:
    runs-on: self-hosted
    needs: lint-and-audit
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env from example
        run: cp .env.example .env

      - name: Compose build 
        run: docker compose up -d --build 
    
      - name: Get app image ref
        id: appimg
        run: |
          cid="$(docker compose ps -q app)"
          ref="$(docker inspect -f '{{.Config.Image}}' "$cid")"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Trivy scan app image (HIGH,CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.40.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            "${{ steps.appimg.outputs.ref }}"

      - name: Trivy scan postgres:latest (HIGH,CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.40.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            "postgres:latest"

      - name: Wait for DB readiness
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_HOST} && exit 0
            sleep 2
          done
          echo "DB non pronto entro il timeout"; docker compose logs db; exit 1

      - name: Run integration tests
        run: docker compose exec -T app npm run test

      - name: Cleanup
        if: always()
        run: docker compose down -v
        
  deploy:
    runs-on: self-hosted
    needs: build-and-scan-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: | 
          cp .env.example .env
          docker compose up -d --build 
          echo "App pronta su http://localhost:${PORT}"
      
      - name: Pulisci immagini inutilizzate
        if: always()
        run: docker image prune -f
